<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Карта Яндекса</title>
  <script src="https://api-maps.yandex.ru/2.1/?apikey=ВАШ_API_KEY&lang=ru_RU" type="text/javascript"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 1920px;
      height: 1080px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    ymaps.ready(init);

    function init() {
      const map = new ymaps.Map("map", {
        center: [56.532562, 92.956225],
        zoom: 18,
        type: "yandex#satellite",
        controls: []
      });

      map.behaviors.disable([
        "scrollZoom",
        "drag",
        "multiTouch"
      ]);

      window.mapReady = true;
    }
  </script>
</body>
</html>
