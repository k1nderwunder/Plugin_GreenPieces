<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Screenshot</title>
  <script src="https://api-maps.yandex.ru/2.1/?apikey={{YANDEX_MAPS_API_KEY}}&lang=ru_RU"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #map {
      width: 1920px;
      height: 1080px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    window.mapReady = false;

    ymaps.ready(init);

    async function init() {
      try {
        const response = await fetch("current_field.json");
        if (!response.ok) {
          throw new Error("Не удалось загрузить current_field.json: " + response.status);
        }

        const field = await response.json();

        if (!field.outerBoundary || !Array.isArray(field.outerBoundary) || field.outerBoundary.length === 0) {
          throw new Error("В current_field.json нет outerBoundary");
        }

        const map = new ymaps.Map("map", {
          center: [55.75, 37.61],
          zoom: 10,
          type: "yandex#satellite",
          controls: []
        });

        const coords = [
          field.outerBoundary.map(coord => [coord[1], coord[0]])
        ];

        const polygon = new ymaps.Polygon(
          coords,
          {
            hintContent: field.name || "field",
            balloonContent: field.name || "field"
          },
          {
            fillOpacity: 0,
            strokeColor: "#ff0000",
            strokeWidth: 3
          }
        );

        map.geoObjects.add(polygon);

        const bounds = polygon.geometry.getBounds();
        map.setBounds(bounds, {
          checkZoomRange: true,
          zoomMargin: 40
        });

        setTimeout(() => {
          window.mapReady = true;
        }, 2500);

      } catch (error) {
        console.error(error);
        window.mapReady = "error";
      }
    }
  </script>
</body>
</html>
